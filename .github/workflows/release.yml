name: Build release

on:
  push:
    tags:
      - 'disabled-for-retroactive-tag-push'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Resolve version
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building release $VERSION"

      - name: Clone TiddlyWiki5
        run: npm run setup

      - name: Sync version → plugin.info
        run: npm run sync-version

      - name: Build versioned wiki
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          mkdir -p "docs/$VERSION"
          node vendor/tiddlywiki/tiddlywiki.js wiki \
            --output "docs/$VERSION" \
            --build index
          cp "docs/$VERSION/index.html" docs/index.html

      - name: Build plugin .json artifact
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          node vendor/tiddlywiki/tiddlywiki.js wiki \
            --output "docs/$VERSION" \
            --build plugin
          node tools/build-plugin.js "docs/$VERSION"

      - name: Commit + push
        env:
          VERSION: ${{ steps.ver.outputs.VERSION }}
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          # Switch to main (workflow checked out the tag in detached HEAD).
          # `git checkout -B` reliably creates/resets main from the remote
          # tracking ref even when no local main exists yet.
          git fetch origin main
          git checkout -B main origin/main
          git add "docs/$VERSION" docs/index.html
          if git diff --staged --quiet; then
            echo "No artifact changes to commit."
            exit 0
          fi
          git commit -m "build: release $VERSION [skip ci]"
          # Retry push once if main moved between our fetch and push (e.g.
          # the latest.yml workflow racing on the tag-push commit).
          for attempt in 1 2 3; do
            if git push origin main; then exit 0; fi
            echo "Push attempt $attempt rejected; rebasing on latest origin/main"
            git fetch origin main
            git rebase origin/main
          done
          echo "Push failed after retries"
          exit 1
