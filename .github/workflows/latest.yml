name: Build latest

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.meta/**'
      - 'README.md'
      - '.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone TiddlyWiki5
        run: npm run setup

      - name: Build latest
        run: npm run build:latest

      - name: Commit docs/latest.html
        run: |
          set -euxo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/latest.html
          if git diff --staged --quiet; then
            echo "No change in docs/latest.html — nothing to commit."
            exit 0
          fi
          git commit -m "build: latest [skip ci]"
          # Retry push if main moved between our checkout and push (e.g.
          # the release.yml workflow racing on a tag-push commit, or any
          # other concurrent push).  docs/latest.html is the only thing
          # we stage, so rebasing is safe.
          for attempt in 1 2 3; do
            if git push origin HEAD:main; then exit 0; fi
            echo "Push attempt $attempt rejected; rebasing on latest origin/main"
            git fetch origin main
            git rebase origin/main
          done
          echo "Push failed after retries"
          exit 1
