name: Build latest

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '.meta/**'
      - 'README.md'
      - '.github/workflows/release.yml'

permissions:
  contents: write

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone TiddlyWiki5
        run: npm run setup

      - name: Build latest
        run: npm run build:latest

      - name: Commit docs/latest.html
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/latest.html
          if git diff --staged --quiet; then
            echo "No change in docs/latest.html — nothing to commit."
            exit 0
          fi
          git commit -m "build: latest [skip ci]"
          git push
